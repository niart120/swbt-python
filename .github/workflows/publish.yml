name: Publish

"on":
  workflow_dispatch:
    inputs:
      target:
        description: "Package index to publish to"
        required: true
        default: testpypi
        type: choice
        options:
          - testpypi
          - pypi

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}-${{ inputs.target }}
  cancel-in-progress: false

jobs:
  validate:
    name: Validate publish target
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Show publish target
        run: |
          echo "target=${{ inputs.target }}"
          echo "ref=${{ github.ref }}"
          echo "ref_type=${{ github.ref_type }}"
          echo "ref_name=${{ github.ref_name }}"

      - name: Reject production publish without a v tag ref
        if: ${{ inputs.target == 'pypi' && (github.ref_type != 'tag' || !startsWith(github.ref_name, 'v')) }}
        run: |
          echo "target=pypi must be run from a v* tag ref." >&2
          exit 1

  build:
    name: Build distribution
    needs: validate
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Set up uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          version: "0.11.26"
          python-version: "3.13"
          enable-cache: true
          cache-dependency-glob: uv.lock

      - name: Check lockfile
        run: uv lock --check

      - name: Sync dependencies
        run: uv sync --locked --dev

      - name: Build package
        run: |
          rm -rf dist
          uv build

      - name: Check package metadata
        shell: bash
        run: |
          VERSION="$(uv run python -c "import tomllib; print(tomllib.load(open('pyproject.toml', 'rb'))['project']['version'])")"
          WHEEL="dist/swbt_python-${VERSION}-py3-none-any.whl"
          SDIST="dist/swbt_python-${VERSION}.tar.gz"
          test -f "${WHEEL}"
          test -f "${SDIST}"
          uvx --from twine twine check --strict "${WHEEL}" "${SDIST}"

      - name: Upload distribution artifact
        uses: actions/upload-artifact@v5
        with:
          name: python-package-distributions
          path: dist/
          if-no-files-found: error

  publish-to-testpypi:
    name: Publish to TestPyPI
    if: ${{ inputs.target == 'testpypi' }}
    needs:
      - validate
      - build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment:
      name: testpypi
      url: https://test.pypi.org/p/swbt-python
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Download distribution artifact
        uses: actions/download-artifact@v6
        with:
          name: python-package-distributions
          path: dist/

      - name: Publish package distributions to TestPyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/

  create-github-release:
    name: Create draft GitHub Release
    if: ${{ inputs.target == 'pypi' && github.ref_type == 'tag' && startsWith(github.ref_name, 'v') }}
    needs:
      - validate
      - build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write

    steps:
      - name: Download distribution artifact
        uses: actions/download-artifact@v6
        with:
          name: python-package-distributions
          path: dist/

      - name: Create or reuse draft release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          TAG="${GITHUB_REF_NAME}"
          if IS_DRAFT="$(gh release view "${TAG}" --json isDraft --jq .isDraft 2>/dev/null)"; then
            if [ "${IS_DRAFT}" != "true" ]; then
              echo "GitHub Release ${TAG} is already published." >&2
              exit 1
            fi
          else
            gh release create "${TAG}" --verify-tag --draft --generate-notes --title "${TAG}"
          fi

      - name: Upload distributions to draft release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload "${GITHUB_REF_NAME}" dist/* --clobber

  publish-to-pypi:
    name: Publish to PyPI
    if: ${{ inputs.target == 'pypi' && github.ref_type == 'tag' && startsWith(github.ref_name, 'v') }}
    needs:
      - create-github-release
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment:
      name: pypi
      url: https://pypi.org/p/swbt-python
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Download distribution artifact
        uses: actions/download-artifact@v6
        with:
          name: python-package-distributions
          path: dist/

      - name: Publish package distributions to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

  publish-github-release:
    name: Publish GitHub Release
    if: ${{ inputs.target == 'pypi' && github.ref_type == 'tag' && startsWith(github.ref_name, 'v') }}
    needs:
      - publish-to-pypi
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: write

    steps:
      - name: Publish draft release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release edit "${GITHUB_REF_NAME}" --draft=false --latest
