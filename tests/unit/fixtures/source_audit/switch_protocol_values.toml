value = "Bumble transport passes ControllerProfile.hid_report_descriptor into the SDP HID descriptor list and uses profile.device_name as the default service/device name, while an explicit device_name override wins. Descriptor-adjacent Bluetooth/SDP values remain Pro-compatible fixed values for now, including Class of Device 0x002508, HID country code 0x21, remote wake true, supervision timeout 0x0c80, and SSR max/min 0xffff. Joy-Con descriptor bytes remain unaudited and are not promoted to a stable profile-specific SDP fixture."
