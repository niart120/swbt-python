[[entry]]
id = "bumble_acl_packet_queue_drain_boundary"
fixture_name = "bumble_acl_packet_queue_drain_boundary"
area = "transport"
value = "Bumble 0.0.230 hid.HID.send_data writes the HID interrupt PDU to the L2CAP interrupt channel; L2CAP send ultimately enqueues ACL packets through Host.send_acl_sdu; DataPacketQueue exposes pending and async drain(connection_handle). swbt-python treats send_interrupt as complete after the matching ACL packet queue drains, using connection.acl_packet_queue when present and falling back to connection.device.host.get_data_packet_queue(handle)."
classification = "implementation fact"
source = [
    '.venv\Lib\site-packages\bumble\hid.py:321-330',
    '.venv\Lib\site-packages\bumble\l2cap.py:1214-1222',
    '.venv\Lib\site-packages\bumble\host.py:48-187',
