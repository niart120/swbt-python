value = "Joy-Con (L) hardware runs on Windows 11 / CSR8510 A10 / WinUSB / Bumble 0.0.230 observed subcommand 0x40 Enable IMU with first payload byte 0x02 during pairing handshake. swbt-python accepts 0x02 only for Joy-Con profiles, records it as SubcommandSessionState.imu_mode, and treats it as IMU enabled for session-state diagnostics. The later SR+SL-after-observed-window run completed pairing, but the Switch toast still identified the registration as Pro Controller while the controller order screen treated it as Joy-Con L. The trace still used local Bluetooth address 00:1B:DC:F9:9F:7D on-air but zero bytes in the 0x02 Device Info payload. This is hardware-observed only and does not change the Pro Controller 0x00/0x01 source fact."
