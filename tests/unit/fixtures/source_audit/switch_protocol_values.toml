[[entry]]
id = "bumble_reference_classic_link_policy"
fixture_name = "bumble_reference_classic_link_policy"
area = "transport"
value = "swbt-daemon production Classic discovery config sets default link policy to ROLE_SWITCH|SNIFF_MODE, i.e. 0x0005. swbt-python sends HCI_Write_Default_Link_Policy_Settings_Command(0x0005) after Bumble power_on and before connectable/discoverable advertising to match that reference policy. BTstack allow_role_switch=true is documented as an outgoing classic ACL setting, so it is not treated as an incoming Switch connection fix."
classification = "implementation fact"
source = [
    'E:\documents\VSCodeWorkspace\swbt-daemon\swbt\btstack_bridge\production_btstack_impl.c:130-134',
    'E:\documents\VSCodeWorkspace\swbt-daemon\vendor\btstack\src\gap.h:432-443',
